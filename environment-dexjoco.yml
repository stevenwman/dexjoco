name: dexjoco
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - av=10.0.0
  - pip:
      - mujoco==3.4.0
      - gymnasium==1.0.0
      - dm-robotics-transformations==0.8.1
      - lxml==5.3.0
      - imageio==2.36.1
      - imageio-ffmpeg==0.5.1
      - opencv-python==4.10.0.84
      - numpy==1.26.4
      - scipy==1.11.4
      - matplotlib==3.10.0
      - absl-py==2.1.0
      - tqdm==4.67.1
      - zarr==2.18.3
      - PyOpenGL==3.1.10
      - glfw==2.10.0
      - -e ./dexjoco_sim

# Default research environment for simulation and demo recording.
# Training, robot infra, and teleoperation dependencies are intentionally kept
# out of this environment.
